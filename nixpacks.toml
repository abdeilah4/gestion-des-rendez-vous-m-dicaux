[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.gd",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.tokenizer",
  "php82Extensions.openssl",
  "php82Extensions.hash",
  "php82Extensions.fileinfo",
  "php82Extensions.pcre",
  "php82Extensions.session",
  "php82Extensions.dom",
  "php82Extensions.ctype"
]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"